spring.application.name=smart-trader-v1
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=coinbase
spring.main.allow-circular-references = true
spring.redis.host=localhost
spring.redis.port=6379

PUBLIC_API_URL=https://api.coinbase.com/api/v3/brokerage/market/products

logging.file.name=logs/smart_trader_v1.log
logging.file.path=logs
logging.level.com.techcobber.smarttrader.v1=INFO
# --- Mongo logging setup ---
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.springframework.data.mongodb.repository.Query=DEBUG
logging.level.org.mongodb.driver.protocol.command=DEBUG
logging.level.org.mongodb.driver=INFO