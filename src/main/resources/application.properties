spring.application.name=smart-trader-v1
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=coinbase_v1
spring.main.allow-circular-references = true
#spring.data.redis.host=localhost
#spring.data.redis.port=6379

PUBLIC_API_URL=https://api.coinbase.com/api/v3/brokerage/market/products
APP_DEFAULT_USER = ${APP_DEFAULT_USER}
SMART_TRADER_V1_PORTFOLIO_ID = ${SMART_TRADER_V1_PORTFOLIO_ID}
candles.ignore.names: BTC-USDC,ETH-USDC
scanner.candles.interval.ms:300000

# --- Trading granularity (Coinbase Granularity enum names) ---
# LTF: entry timeframe for price-action analysis
trading.granularity.ltf=FIFTEEN_MINUTE
# Confirm: intermediate confirmation timeframe
trading.granularity.confirm=ONE_HOUR
# HTF: highest timeframe for trend direction (TWO_HOUR proxies 4H; Coinbase has no FOUR_HOUR)
trading.granularity.htf=TWO_HOUR

# --- OAuth 2.0 Resource Server (JWT) ---
# Set this to the JWKS URI of your OAuth 2.0 authorization server.
# REQUIRED: The application will fail to start if OAUTH2_JWK_SET_URI is not set.
# Examples:
#   Auth0:   https://<tenant>.auth0.com/.well-known/jwks.json
#   Keycloak: http://localhost:8180/realms/<realm>/protocol/openid-connect/certs
#   Okta:    https://<domain>.okta.com/oauth2/default/v1/keys
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${OAUTH2_JWK_SET_URI}
spring.security.oauth2.client.registration.github.client-id=${OAUTH2_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret:${OAUTH2_CLIENT_SECRET}

# --- Actuator ---
# Expose health and info endpoints for monitoring / container probes.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

logging.file.name=logs/smart_trader_v1.log
logging.file.path=logs
logging.level.com.techcobber.smarttrader.v1=INFO
# --- Mongo logging setup ---
logging.level.org.springframework.data.mongodb.core.MongoTemplate=INFO
logging.level.org.springframework.data.mongodb.repository.Query=INFO
logging.level.org.mongodb.driver.protocol.command=INFO
logging.level.org.mongodb.driver=INFO

# --- Resilience4j Rate Limiter ---
resilience4j.ratelimiter.instances.apiRateLimiter.limitForPeriod=100
resilience4j.ratelimiter.instances.apiRateLimiter.limitRefreshPeriod=1s
resilience4j.ratelimiter.instances.apiRateLimiter.timeoutDuration=0s

# --- Resilience4j Circuit Breaker ---
resilience4j.circuitbreaker.instances.orderService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.orderService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.orderService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.orderService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.orderService.slidingWindowType=COUNT_BASED

resilience4j.circuitbreaker.instances.coinbasePublicService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.coinbasePublicService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.coinbasePublicService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.coinbasePublicService.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.coinbasePublicService.slidingWindowType=COUNT_BASED